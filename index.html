<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Incense | Mystical & Natural Scents</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="intro-overlay">
        <div class="intro-content">
            <h1 class="intro-text">AURA INCENSE</h1>
            <p class="intro-sub">Bring peace and calm to your space...</p>
        </div>
    </div>

    <header class="header">
        <div class="logo">AURA INCENSE</div>
        <nav class="nav-links">
            <a href="https://wa.me/905xxxxxxxxx" target="_blank" class="contact-top-btn">
                <i class="fab fa-whatsapp"></i> Contact Us
            </a>
        </nav>
    </header>

    
    <main class="container">
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterProducts('all')">All Scents</button>
            <button class="filter-btn" onclick="filterProducts('sticks')">Incense Sticks</button>
            <button class="filter-btn" onclick="filterProducts('cones')">Backflow Cones</button>
            <button class="filter-btn" onclick="filterProducts('holders')">Burners & Holders</button>
        </div>

        <div id="product-list" class="product-grid"></div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="Product Detail">
                <div class="modal-info">
                    <h2 id="modalName">Product Name</h2>
                    <p id="modalDesc">Product description goes here...</p>
                    <span id="modalPrice" class="price">$0.00</span>
                    <a id="modalWhatsApp" href="" class="buy-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> Order via WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>By Designer <strong>AylizDev</strong></p>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/ayliz-azaklı-74579b318/" target="_blank" class="li"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/merveayliz" target="_blank" class="gh"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/ayliz.dev" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
